<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <title>Form Practice</title>
        <meta name="description" content="">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <link rel="stylesheet" href="">
    </head>
    <body>
    <div>
        <form action="" method="">
            <label>First Name</label>
            <input type="text" id="first-name"/>
            <label>Last Name</label>
            <input type="text" id="last-name"/>
            <input type="submit" value="Submit">
        </form>
        <p>Select Your Favorite Programing Language:</p>
        <form>
            <label for="java">Java</label>
            <input type="radio" name="language" id="java-language" value="java"/>
            <label for="java">Python</label>
            <input type="radio" name="language" id="python-language" value="python"/>
            <label for="java">C++</label>
            <input type="radio" name="language" id="c++-language" value="c++"/>
        </form>
        <p>Select what applies to you:</p>
        <form>
            <input type="checkbox" id="vehicle1" name="vehicle1" value="bike"/>
            <label for="vehicle1"> I have a bike</label>
            <input type="checkbox" id="vehicle1" name="vehicle2" value="car"/>
            <label for="vehicle2"> I have a car</label>
            <input type="checkbox" id="vehicle1" name="vehicle3" value="boat"/>
            <label for="vehicle3"> I have a boat</label>
        </form>
        <p>Related Elements</p>
        <form>
            <fieldset>
            <legend>Personal Informaiton</legend>
            <label>First Name</label>
            <input type="text" id="first-name"/>
            <label>Last Name</label>
            <input type="text" id="last-name"/>
            </fieldset>
            <fieldset>
                <legend>Vehicles</legend>
                <label for="cars">Choose Your Car</label>
                <select id="cars" name="cars">
                    <option value="volvo"> Volvo</option>
                    <option value="saab">Sabb</option>
                    <option value="tesla">Tesla</option>
            </fieldset>
        </form>
        <form>
        <fieldset>
        <label for="section">Section:</label>
        <textarea id="section" name="sectionss" rows="4" cols="50" placeholder="Type here..."></textarea>
        </fieldset>
        </form>
    </div>
    </body>
</html>
