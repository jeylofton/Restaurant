<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <title></title>
        <meta name="description" content="">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <link rel="stylesheet" href="styles.css">
        <script src="https://kit.fontawesome.com/337be747ec.js" crossorigin="anonymous"></script>
    </head>
    <body>
        <header>
            <div class="header-container">
                <div>
                    <i class="fa-solid fa-bars"></i>
                </div>
                <h1>Alma de Panamá</h1>
                <nav>
                    <a href="index.html">Home</a>
                    <a href="menu.html">Menu</a>
                    <a href="togo.html">To Go</a>
                </nav>
                <div>
                    <i class="fa-solid fa-cart-shopping"></i>
                </div>
            </div>
        </header>
        <main>
            <div class="form-flex">
                <div>
                <img src="/images/el-trapiche.jpg" alt="el-trapiche">
                </div>
                <div class="form-container">
                    <h2>El Trapiche</h2>
                    <form action="">
                        <div class="input-container">
                            <label for="size">Size</label>
                            <select name="size" id="size">
                                <option value="small">Small</option>
                                <option value="Medium">Medium</option>
                                <option value="Large">Large</option>
                            </select>
                        </div>
                        <div class="input-container">
                            <label for="price">Price</label>
                            <input type="number" id="price" name="price">
                        </div>
                        <div class="input-container">
                            <label for="quantity">Quantity</label>
                            <input type="number" id="quantity" name="quantity">
                        </div>
                        <div class="input-container">
                            <label for="description">Description</label>
                            <textarea id="description" name="descriptions"></textarea>
                        </div>
                        <button class="btn">Add</button>
                    </form>
                </div>
            </div>
            <div class="payment-form">
                <div class="payment-container">
                    <div>
                        <p>Payment Form</p>
                    </div>
                    <form action="">
                        <fieldset>
                            <legend>Account Informaiton</legend>
                            <div class="account-row">
                            <div>
                            <label>First Name</label>
                            <input type="text" id="first-name">
                            </div>
                            <div>
                            <label>Last Name</label>
                            <input type="text" id="last-name">
                            </div>
                            </div>
                            <div>
                            <label for="">Email Address</label>
                            <input type="text" id="email" placeholder="Email Address"/>
                            </div>
                            <div>
                            <label for="">Date of Birth</label>
                                <input type="date">
                            </div>
                            <div>
                            <label>Gender</label>
                            <select name="gender" id="gender">
                                <option value="male">Male</option>
                                <option value="female">Female</option>
                            </select>
                            </div>
                        </fieldset>
                        <fieldset>
                            <Legend>Payment Details</Legend>
                            <div class="payment-methods">
                            <input type="radio" name="pay" checked>
                            <label for="cc"><i class="fa-regular fa-credit-card"></i>Credit Card</label>
                            <input type="radio" name="pay">
                            <label for="pp"><i class="fa-brands fa-cc-paypal"></i>Paypal</label>
                            </div>
                            <div class="card-row">
                                <label for="number">
                                    <i class="fa-regular fa-credit-card"></i>
                                </label>
                                <input type="text" 
                                id="number" 
                                maxlength="16" 
                                placeholder="1234 5678 9631 1254">
                            </div>
                            <div class="payment-data">
                                <div>
                                    <label for="cvc">CVC</label>
                                    <input id="cvc" type="number" maxlength="6">
                                </div>
                                <div>
                                    <select name="month" id="month">
                                    <option>JAN</option>
                                    <option>FEB</option>
                                    <option>MAR</option>
                                    <option>APR</option>
                                    <option>MAY</option>
                                    <option>JUN</option>
                                    <option>JUL</option>
                                    <option>AUG</option>
                                    <option>SEP</option>
                                    <option>OCT</option>
                                    <option>NOV</option>
                                    <option>DEC</option>
                                </select>
                                </div>
                                <div>
                                    <select name="year" id="year">
                                    <option>2025</option>
                                    <option>2026</option>
                                    <option>2027</option>
                                    <option>2028</option>
                                    <option>2029</option>
                                    <option>2030</option>
                                    <option>2031</option>
                                    <option>2032</option>
                                    <option>2033</option>
                                </select>
                                </div>
                            </div>
                            <div class="payment-zip">
                                <div>
                                <label for="text">Billing Address</label>
                                <input type="text"/>
                                </div>
                                <div>
                                <label for="text">Zip Code</label>
                                <input type="text" maxlength="5"/>
                                </div>
                            </div>
                        </fieldset>
                        <div>
                            <div>
                                <button class="btn-pay" type="submit">Pay Now</button>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
        </main>
    </body>
</html>
