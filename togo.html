<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <title></title>
        <meta name="description" content="">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <link rel="stylesheet" href="styles.css">
        <script src="https://kit.fontawesome.com/337be747ec.js" crossorigin="anonymous"></script>
    </head>
    <body>
        <header>
            <div class="header-container">
                <div>
                    <i class="fa-solid fa-bars"></i>
                </div>
                <h1>Alma de Panamá</h1>
                <nav>
                    <a href="index.html">Home</a>
                    <a href="menu.html">Menu</a>
                    <a href="togo.html">To Go</a>
                </nav>
                <div>
                    <i class="fa-solid fa-cart-shopping"></i>
                </div>
            </div>
        </header>
        <main>
            <div class="form-flex">
                <div>
                <img src="/images/el-trapiche.jpg" alt="el-trapiche">
                </div>
                <div class="form-container">
                    <h2>EL Trapiche</h2>
                    <form action="">
                        <div class="input-container">
                            <label for="size">Size</label>
                            <select name="size" id="size">
                                <option value="small">Small</option>
                                <option value="Medium">Medium</option>
                                <option value="Large">Large</option>
                            </select>
                        </div>
                        <div class="input-container">
                            <label for="price">Price</label>
                            <input type="number" id="price" name="price">
                        </div>
                        <div class="input-container">
                            <label for="quantity">Quantity</label>
                            <input type="number" id="quantity" name="quantity">
                        </div>
                        <div class="input-container">
                            <label for="description">Description</label>
                            <textarea id="description" name="descriptions"></textarea>
                        </div>
                        <button class="btn">Add</button>
                    </form>
                </div>
            </div>
        </main>
    </body>
</html>
